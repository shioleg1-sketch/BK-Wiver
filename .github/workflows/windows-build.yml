name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: |
          cargo build --release -p bk-wiver-host
          cargo build --release -p bk-wiver-console

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Host installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "Host\installer\windows\BK-Wiver-Host.iss"

      - name: Build Console installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "Consol\installer\windows\BK-Wiver-Consol.iss"

      - name: Upload raw executables
        uses: actions/upload-artifact@v4
        with:
          name: bk-wiver-windows-exe
          path: |
            target/release/bk-wiver-host.exe
            target/release/bk-wiver-console.exe
          if-no-files-found: error

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: bk-wiver-windows-installers
          path: |
            dist/BK-Host-Setup.exe
            dist/BK-Console-Setup.exe
          if-no-files-found: error
