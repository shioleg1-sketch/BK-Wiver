name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Fetch FFmpeg
        shell: pwsh
        run: ./scripts/fetch_ffmpeg_windows.ps1

      - name: Build release binaries
        run: |
          cargo build --release -p bk-wiver-host
          cargo build --release -p bk-wiver-console

      - name: Prepare installer staging
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "Host\installer\windows\stage" | Out-Null
          New-Item -ItemType Directory -Force -Path "Consol\installer\windows\stage" | Out-Null
          $hostExe = Get-ChildItem -Path "target" -Filter "bk-wiver-host.exe" -Recurse | Select-Object -First 1
          $consoleExe = Get-ChildItem -Path "target" -Filter "bk-wiver-console.exe" -Recurse | Select-Object -First 1
          if (-not $hostExe) { throw "bk-wiver-host.exe not found under target" }
          if (-not $consoleExe) { throw "bk-wiver-console.exe not found under target" }
          Copy-Item -Force $hostExe.FullName "Host\installer\windows\stage\bk-wiver-host.exe"
          Copy-Item -Force $consoleExe.FullName "Consol\installer\windows\stage\bk-wiver-console.exe"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Host installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "Host\installer\windows\BK-Wiver-Host.iss"

      - name: Build Console installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "Consol\installer\windows\BK-Wiver-Consol.iss"

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: bk-wiver-windows-installers
          path: |
            dist/BK-Host-Setup.exe
            dist/BK-Console-Setup.exe
          if-no-files-found: error
