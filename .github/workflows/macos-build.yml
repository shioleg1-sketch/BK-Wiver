name: macOS Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Ensure build script is executable
        run: chmod +x ConsolMac/installer/macos/build_console_macos.sh

      - name: Build macOS installer
        run: ./ConsolMac/installer/macos/build_console_macos.sh

      - name: Upload macOS installers
        uses: actions/upload-artifact@v4
        with:
          name: bk-wiver-macos-installers
          path: |
            ConsolMac/dist/BK-Console macOS.app
            ConsolMac/dist/BK-Console macOS.dmg
          if-no-files-found: error
