name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Fetch FFmpeg
        shell: pwsh
        run: ./scripts/fetch_ffmpeg_windows.ps1

      - name: Build release binaries
        run: |
          cargo build --release -p bk-wiver-host
          cargo build --release -p bk-wiver-console

      - name: Prepare installer staging
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "Host\installer\windows\stage" | Out-Null
          New-Item -ItemType Directory -Force -Path "Consol\installer\windows\stage" | Out-Null
          $hostExe = Join-Path $PWD "target\release\bk-wiver-host.exe"
          $consoleExe = Join-Path $PWD "target\release\bk-wiver-console.exe"
          if (-not (Test-Path $hostExe)) {
            Write-Host "Expected host binary not found at $hostExe"
            if (Test-Path "target\release") {
              Get-ChildItem -Path "target\release" | Select-Object Name, Length, LastWriteTime | Format-Table -AutoSize
            }
            throw "bk-wiver-host.exe not found at target\\release"
          }
          if (-not (Test-Path $consoleExe)) {
            Write-Host "Expected console binary not found at $consoleExe"
            if (Test-Path "target\release") {
              Get-ChildItem -Path "target\release" | Select-Object Name, Length, LastWriteTime | Format-Table -AutoSize
            }
            throw "bk-wiver-console.exe not found at target\\release"
          }
          Copy-Item -Force $hostExe "Host\installer\windows\stage\bk-wiver-host.exe"
          Copy-Item -Force $consoleExe "Consol\installer\windows\stage\bk-wiver-console.exe"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Host installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "Host\installer\windows\BK-Wiver-Host.iss"

      - name: Build Console installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "Consol\installer\windows\BK-Wiver-Consol.iss"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/BK-Host-Setup.exe
            dist/BK-Console-Setup.exe
          generate_release_notes: true
