name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        id: build_binaries
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          function Build-And-ResolveExecutable {
            param(
              [string]$ManifestPath,
              [string]$BinaryName,
              [string]$Label
            )

            $lines = & cargo build --release --manifest-path $ManifestPath --bin $BinaryName --message-format=json-render-diagnostics 2>&1
            if ($LASTEXITCODE -ne 0) {
              $lines | ForEach-Object { Write-Host $_ }
              throw "cargo build failed for $Label"
            }

            $lines | ForEach-Object { Write-Host $_ }

            $resolved = $null
            foreach ($line in $lines) {
              if (-not ($line -is [string]) -or -not $line.StartsWith("{")) {
                continue
              }
              try {
                $message = $line | ConvertFrom-Json
              } catch {
                continue
              }
              if ($message.reason -eq "compiler-artifact" -and $message.executable) {
                $resolved = $message.executable
              }
            }

            if (-not $resolved) {
              Write-Host "cargo did not report an executable for $Label"
              Get-ChildItem -Path $PWD -Recurse -File -Filter "*.exe" -ErrorAction SilentlyContinue |
                Select-Object FullName, Length, LastWriteTime |
                Format-Table -AutoSize
              throw "No executable path resolved for $Label"
            }

            return $resolved
          }

          $hostExe = Build-And-ResolveExecutable -ManifestPath "Host/app/Cargo.toml" -BinaryName "bk-wiver-host" -Label "host"
          $consoleExe = Build-And-ResolveExecutable -ManifestPath "Consol/app/Cargo.toml" -BinaryName "bk-wiver-console" -Label "console"

          "host_exe=$hostExe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "console_exe=$consoleExe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Prepare installer staging
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "Host\installer\windows\stage" | Out-Null
          New-Item -ItemType Directory -Force -Path "Consol\installer\windows\stage" | Out-Null
          $hostExe = "${{ steps.build_binaries.outputs.host_exe }}"
          $consoleExe = "${{ steps.build_binaries.outputs.console_exe }}"
          if (-not (Test-Path $hostExe)) {
            throw "Resolved host binary path does not exist: $hostExe"
          }
          if (-not (Test-Path $consoleExe)) {
            throw "Resolved console binary path does not exist: $consoleExe"
          }
          Copy-Item -Force $hostExe "Host\installer\windows\stage\bk-wiver-host.exe"
          Copy-Item -Force $consoleExe "Consol\installer\windows\stage\bk-wiver-console.exe"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Host installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "Host\installer\windows\BK-Wiver-Host.iss"

      - name: Build Console installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "Consol\installer\windows\BK-Wiver-Consol.iss"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/BK-Host-Setup.exe
            dist/BK-Console-Setup.exe
          generate_release_notes: true
