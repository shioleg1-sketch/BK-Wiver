name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cargo build --release --manifest-path "Host/app/Cargo.toml" --bin bk-wiver-host
          cargo build --release --manifest-path "Consol/app/Cargo.toml" --bin bk-wiver-console

      - name: Prepare installer staging
        shell: pwsh
        run: |
          function Resolve-BinaryPath {
            param(
              [string[]]$Candidates,
              [string]$Label
            )

            foreach ($candidate in $Candidates) {
              if (Test-Path $candidate) {
                return (Resolve-Path $candidate).Path
              }
            }

            $names = $Candidates | ForEach-Object { [System.IO.Path]::GetFileName($_) } | Select-Object -Unique
            foreach ($name in $names) {
              $found = Get-ChildItem -Path $PWD -Recurse -File -Filter $name -ErrorAction SilentlyContinue |
                Select-Object -First 1
              if ($found) {
                return $found.FullName
              }
            }

            Write-Host "Expected $Label binary not found. Known candidate paths:"
            $Candidates | ForEach-Object { Write-Host " - $_" }
            Write-Host "Discovered executables under workspace:"
            Get-ChildItem -Path $PWD -Recurse -File -Filter "*.exe" -ErrorAction SilentlyContinue |
              Select-Object FullName, Length, LastWriteTime |
              Format-Table -AutoSize
            throw "$Label binary not found in expected locations"
          }

          New-Item -ItemType Directory -Force -Path "Host\installer\windows\stage" | Out-Null
          New-Item -ItemType Directory -Force -Path "Consol\installer\windows\stage" | Out-Null
          $hostExe = Resolve-BinaryPath -Label "host" -Candidates @(
            (Join-Path $PWD "target\release\bk-wiver-host.exe"),
            (Join-Path $PWD "target\release\bk_wiver_host.exe"),
            (Join-Path $PWD "Host\app\target\release\bk-wiver-host.exe"),
            (Join-Path $PWD "Host\app\target\release\bk_wiver_host.exe")
          )
          $consoleExe = Resolve-BinaryPath -Label "console" -Candidates @(
            (Join-Path $PWD "target\release\bk-wiver-console.exe"),
            (Join-Path $PWD "target\release\bk_wiver_console.exe"),
            (Join-Path $PWD "Consol\app\target\release\bk-wiver-console.exe"),
            (Join-Path $PWD "Consol\app\target\release\bk_wiver_console.exe")
          )
          Copy-Item -Force $hostExe "Host\installer\windows\stage\bk-wiver-host.exe"
          Copy-Item -Force $consoleExe "Consol\installer\windows\stage\bk-wiver-console.exe"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Host installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "Host\installer\windows\BK-Wiver-Host.iss"

      - name: Build Console installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "Consol\installer\windows\BK-Wiver-Consol.iss"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/BK-Host-Setup.exe
            dist/BK-Console-Setup.exe
          generate_release_notes: true
