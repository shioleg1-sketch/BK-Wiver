# Nginx reverse proxy для BK-Wiver Server
# Установка: sudo cp nginx.conf /etc/nginx/sites-available/bk-wiver
#            sudo ln -s /etc/nginx/sites-available/bk-wiver /etc/nginx/sites-enabled/
#            sudo nginx -t && sudo systemctl reload nginx

upstream bk_wiver_server {
    server 127.0.0.1:8080;
    keepalive 32;
}

# HTTP сервер (редирект на HTTPS или прямой прокси)
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Опционально: редирект на HTTPS
    # return 301 https://$host$request_uri;

    # Или прямой прокси (для LAN без TLS)
    location / {
        proxy_pass http://bk_wiver_server;
        proxy_http_version 1.1;
        
        # Заголовки для WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Стандартные прокси-заголовки
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Таймауты для долгоживущих WebSocket соединений
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Буферы
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # Health check endpoint (для мониторинга)
    location /healthz {
        proxy_pass http://bk_wiver_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}

