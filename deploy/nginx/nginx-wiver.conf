# Nginx конфигурация для BK-Wiver Server
# Сервер: wiver.bk.local (172.16.100.164)

upstream bk_wiver_server {
    server bk-wiver-server:8080;
    keepalive 32;
}

# HTTP сервер
server {
    listen 80;
    listen [::]:80;
    server_name wiver.bk.local;

    # Логи
    access_log /var/log/nginx/bk-wiver-access.log;
    error_log /var/log/nginx/bk-wiver-error.log;

    # Максимальный размер тела запроса (для загрузки файлов)
    client_max_body_size 100M;

    location / {
        proxy_pass http://bk_wiver_server;
        proxy_http_version 1.1;
        
        # Заголовки для WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Стандартные прокси-заголовки
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Таймауты для долгоживущих WebSocket соединений
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Буферы
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # Health check endpoint (для мониторинга)
    location /healthz {
        proxy_pass http://bk_wiver_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }
}
