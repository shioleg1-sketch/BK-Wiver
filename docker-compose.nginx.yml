# Docker Compose для BK-Wiver с Nginx reverse proxy
# Использование: docker compose -f docker-compose.nginx.yml up -d

services:
  postgres:
    image: postgres:17
    container_name: bk-wiver-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bkwiver}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - bk_wiver_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bkwiver}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bk_wiver_internal

  server:
    build:
      context: .
      dockerfile: Server/app/Dockerfile
    container_name: bk-wiver-server
    restart: unless-stopped
    environment:
      BK_WIVER_SERVER_ADDR: 0.0.0.0:8080
      BK_WIVER_SERVER_URL: ${SERVER_PUBLIC_URL:-http://localhost:8080}
      BK_WIVER_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bkwiver}
      RUST_LOG: ${RUST_LOG:-info,tower_http=info}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bk_wiver_internal
    expose:
      - "8080"

  nginx:
    image: nginx:alpine
    container_name: bk-wiver-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - server
    networks:
      - bk_wiver_internal
      - default

volumes:
  bk_wiver_postgres_data:
  nginx_logs:

networks:
  bk_wiver_internal:
    driver: bridge
